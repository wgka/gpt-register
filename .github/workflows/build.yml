name: 多平台打包发布（Go + Web）

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: '版本号 (如 v1.0.0)'
        required: false
        default: 'dev'

jobs:
  build:
    name: 构建 ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            name: windows-x64
            goos: windows
            goarch: amd64
            artifact_name: codex-register.exe
            asset_name: codex-register-windows-x64.exe
          - os: ubuntu-latest
            name: linux-x64
            goos: linux
            goarch: amd64
            artifact_name: codex-register
            asset_name: codex-register-linux-x64

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: 设置 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: 构建前端（产物输出到 web/dist）
        run: |
          cd frontend
          npm ci
          npm run build

      - name: 构建后端（Go）
        shell: bash
        run: |
          mkdir -p dist
          CGO_ENABLED=0 GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} go build -trimpath -ldflags "-s -w" -o dist/${{ matrix.artifact_name }} .

      - name: 上传构建产物（artifact）
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: dist/${{ matrix.artifact_name }}
          if-no-files-found: error

  release:
    name: 创建发布
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write

    steps:
      - name: 下载所有构建产物
        uses: actions/download-artifact@v4
        with:
          path: dist/

      - name: 整理文件
        run: |
          mkdir -p release
          find dist/ -type f | while read f; do
            name=$(basename "$f")
            cp "$f" "release/$name"
          done
          ls -lh release/

      - name: 创建 GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*
          generate_release_notes: true
          body: |
            ## OpenAI/Codex CLI 自动注册系统

            ### 下载说明
            | 平台 | 文件 |
            |------|------|
            | Windows x64 | `codex-register-windows-x64.exe` |
            | Linux x64 | `codex-register-linux-x64` |

            ### 使用方法
            ```bash
            # Linux/macOS 需要先赋予执行权限
            chmod +x codex-register-*

            # 启动 Web UI
            ./codex-register

            # 指定端口
            ./codex-register --port 8080
            ```
